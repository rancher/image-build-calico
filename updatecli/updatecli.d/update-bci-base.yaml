---
name: 'Update BCI base image digest'

sources:
  current_digest:
    name: Get current BCI base image digest from Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: BCI_IMAGE

  subtag:
    name: Get latest BCI base image subtag for configured stream
    kind: dockerimage
    spec:
      image: '{{ .image.bci.name }}'
      versionfilter:
        kind: regex
        pattern: '^{{ .image.bci.tag }}-[0-9]+\.[0-9]+$'

  digest:
    name: Get latest BCI base image digest
    kind: dockerdigest
    dependson:
      - subtag
    spec:
      image: '{{ .image.bci.name }}'
      tag: '{{ source "subtag" }}'

conditions:
  image:
    name: Check BCI base image exists
    kind: dockerimage
    sourceid: digest
    spec:
      image: '{{ .image.bci.name }}'
      architecture: amd64
      tag: '{{ source "digest" }}'
  cve_gate:
    name: Update only if current digest has CVEs and candidate has fewer CVEs
    kind: shell
    disablesourceinput: true
    spec:
      command: './updatecli/scripts/should-update-bci-digest.sh "{{ source "current_digest" }}" "{{ .image.bci.name }}:{{ source "digest" }}" "{{ source "subtag" }}"'

targets:
  dockerfile:
    name: 'Update BCI base image digest'
    kind: dockerfile
    scmid: default
    sourceid: digest
    transformers:
      - addprefix: '{{ .image.bci.name }}:'
    spec:
      file: 'Dockerfile'
      instruction:
        keyword: 'ARG'
        matcher: 'BCI_IMAGE'

scms:
  default:
    kind: github
    spec:
      token: '{{ requiredEnv .github.token }}'
      username: '{{ requiredEnv .github.username }}'
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ requiredEnv "GITHUB_REPOSITORY_OWNER" }}'
      repository: '{{ requiredEnv "UPDATECLI_GITHUB_REPO" }}'
      branch: '{{ requiredEnv "UPDATECLI_GITHUB_BRANCH" }}'

actions:
  default:
    title: 'Update BCI base image digest'
    kind: github/pullrequest
    scmid: default
    spec:
      description:
        <h3>Update BCI base image digest</h3>
        <ul>
          <li>{{ .image.bci.name }}:{{ source "subtag" }}</li>
          <li>{{ source "digest" }}</li>
        </ul>
      labels:
        - chore
        - skip-changelog
        - status/auto-created
      merge:
        # TODO: use strategy `auto` when automerge and rulesets are applied
        strategy: client
        after: 0s
      mergemethod: squash

---
name: 'Update BCI base image tag'

sources:
  tag:
    name: Get latest BCI base image tag
    kind: dockerimage
    spec:
      image: '{{ .image.bci.name }}'
      versionfilter:
        kind: regex
        pattern: '^\d+\.\d+$'
  digest:
    name: Get latest BCI base image digest
    kind: dockerdigest
    dependson:
      - tag
    spec:
      image: '{{ .image.bci.name }}'
      tag: '{{ source "tag" }}'

conditions:
  image:
    name: Check BCI base image exists
    kind: dockerimage
    sourceid: digest
    spec:
      image: '{{ .image.bci.name }}'
      architecture: amd64
      tag: '{{ source "digest" }}'

targets:
  dockerfile:
    name: 'Update BCI base image digest'
    kind: dockerfile
    scmid: default
    sourceid: digest
    transformers:
      - addprefix: '{{ .image.bci.name }}:'
    spec:
      file: 'Dockerfile'
      instruction:
        keyword: 'ARG'
        matcher: 'BCI_IMAGE'
  updatecli:
    name: 'Update BCI base image tag'
    kind: yaml
    scmid: default
    sourceid: tag
    spec:
      file: 'updatecli/values.yaml'
      key: '$.image.bci.tag'

scms:
  default:
    kind: github
    spec:
      token: '{{ requiredEnv .github.token }}'
      username: '{{ requiredEnv .github.username }}'
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ requiredEnv "GITHUB_REPOSITORY_OWNER" }}'
      repository: '{{ requiredEnv "UPDATECLI_GITHUB_REPO" }}'
      branch: '{{ requiredEnv "UPDATECLI_GITHUB_BRANCH" }}'

actions:
  default:
    title: 'Update BCI base image tag'
    kind: github/pullrequest
    scmid: default
    spec:
      description:
        <h3>Update BCI base image tag</h3>
        <ul>
          <li>{{ .image.bci.name }}:{{ source "tag" }}</li>
        </ul>
      labels:
        - chore
        - skip-changelog
        - status/auto-created
      merge:
        strategy: manual
      mergemethod: squash
